<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>سایت ساده من</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .btn {
      background: #38bdf8;
      color: black;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 40px 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      width: 250px;
      border-radius: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #1e293b;
      margin-top: 40px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
    🌐 سایت ساده من
  </header>

  <section class="hero">
    <h1>سلام 👋</h1>
    <p>این یه سایت ساده با HTML و CSS هست</p>
    <button class="btn">شروع کن</button>
  </section>

  <section class="cards">
    <div class="card">
      <h3>طراحی ساده</h3>
      <p>کاملاً سبک و قابل فهم</p>
    </div>

    <div class="card">
      <h3>سریع</h3>
      <p>بدون هیچ کتابخونه اضافه</p>
    </div>

    <div class="card">
      <h3>قابل توسعه</h3>
      <p>می‌تونی بعداً حرفه‌ایش کنی</p>
    </div>
  </section>

  <footer>
    © 2026 - ساخته شده با HTML و CSS
  </footer>

</body>
</html>
